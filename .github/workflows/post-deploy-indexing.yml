name: Post-deploy indexing

on:
  deployment_status:

jobs:
  ping:
    # Vercel이 Production 배포를 완료했을 때만 실행
    if: >
      github.event.deployment_status.state == 'success' &&
      (
        github.event.deployment.environment == 'Production' ||
        github.event.deployment.environment == 'production'
      )
    runs-on: ubuntu-latest
    steps:
      - name: IndexNow + Google sitemap ping
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X GET "https://www.today2424.kr/api/cron/indexing" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $STATUS"
          cat /tmp/resp.json
          [ "$STATUS" = "200" ] || exit 1
